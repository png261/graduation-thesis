services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${FRONTEND_VITE_API_URL:-__SAME_ORIGIN__}
        VITE_COGNITO_DOMAIN: ${VITE_COGNITO_DOMAIN:-}
        VITE_COGNITO_CLIENT_ID: ${VITE_COGNITO_CLIENT_ID:-}
        VITE_COGNITO_ISSUER: ${VITE_COGNITO_ISSUER:-}
        VITE_COGNITO_REDIRECT_URI: ${VITE_COGNITO_REDIRECT_URI:-}
        VITE_COGNITO_SCOPE: ${VITE_COGNITO_SCOPE:-}
    image: deepagents-frontend:local
    networks:
      - default
      - backend_shared
    ports:
      - "5173:80"
    restart: unless-stopped

networks:
  backend_shared:
    external: true
    name: backend_default
